name: dotnet-ci

on:
  push:
  pull_request:

concurrency:
  group: dotnet-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  NUGET_PACKAGES: ${{ github.workspace }}\.nuget\packages

jobs:
  verify:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: nuget-${{ runner.os }}-${{ hashFiles('global.json', 'Directory.Build.props', '**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore .\Zongzu.sln

      - name: Build
        run: dotnet build .\Zongzu.sln -c Debug --no-restore

      - name: Run integration tests
        run: >
          dotnet test .\tests\Zongzu.Integration.Tests\Zongzu.Integration.Tests.csproj
          -c Debug
          --no-build
          --results-directory .\TestResults
          --logger "trx;LogFileName=Zongzu.Integration.Tests.trx"

      - name: Run remaining test projects
        shell: pwsh
        run: |
          $projects = Get-ChildItem .\tests -Recurse -Filter *.csproj |
            Where-Object { $_.Name -ne 'Zongzu.Integration.Tests.csproj' } |
            Sort-Object FullName

          foreach ($project in $projects) {
            $logFileName = '{0}.trx' -f [System.IO.Path]::GetFileNameWithoutExtension($project.Name)
            dotnet test $project.FullName `
              -c Debug `
              --no-build `
              --results-directory .\TestResults `
              --logger "trx;LogFileName=$logFileName"

            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }
          }

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-windows
          path: .\TestResults\*.trx
          if-no-files-found: error
